<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老人档案管理 - 东苗养老</title>
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;font-family: "微软雅黑", sans-serif;}
        body {padding: 20px;background: #f5f5f5;}
        .header {width: 100%;background: #FF9900;color: #000;font-size: 22px;font-weight: bold;text-align: center;padding: 10px 0;border: 1px solid #000;margin-bottom: 20px;}
        .container {width: 100%;max-width: 1200px;margin: 0 auto;background: #fff;border: 1px solid #000;padding: 30px;}
        .page-title {font-size: 20px;font-weight: bold;color: #FF6600;text-align: center;margin-bottom: 30px;padding-bottom: 10px;border-bottom: 2px solid #FFE4B5;}
        .back {display: block;width: 120px;height: 36px;line-height: 36px;text-align: center;background: #FFE4B5;border: 1px solid #000;margin: 0 auto;border-radius: 4px;cursor: pointer;color: #000;text-decoration: none;}
        .back:hover {background: #FFD8A8;}
        .func-box {text-align: center;font-size: 16px;margin-bottom: 30px;}
        .func-box button {background: #FFE4B5;border: 1px solid #000;padding: 8px 16px;margin: 0 10px;cursor: pointer;}
        .func-box button:hover {background: #FFD8A8;}

        .search-box {
            text-align: right;
            margin-bottom: 15px;
        }
        .search-input {
            padding: 8px 12px;
            width: 380px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .table-box {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border: 1px solid #000;
        }
        .table-box th, .table-box td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        .table-box th {
            background-color: #FFE4B5;
            font-weight: bold;
        }
        .table-box tr:nth-child(even) {
            background-color: #fdf5e6;
        }
        .table-op a {
            color: #0066cc;
            text-decoration: none;
            margin: 0 3px;
            cursor: pointer;
        }
        .red-row {
            color: red !important;
            font-weight: bold !important;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 5px;
            width: 500px;
            position: relative;
        }
        .close {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 20px;
            cursor: pointer;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            color: #ff6600;
            text-align: center;
        }
        .modal-content .item {
            margin: 10px 0;
            font-size: 14px;
        }
        .modal-content input {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .modal-btns {
            text-align: center;
            margin-top: 20px;
        }
        .modal-btns button {
            padding: 6px 15px;
            margin: 0 5px;
            cursor: pointer;
            background: #ffe4b5;
            border: 1px solid #666;
        }
        .note-text {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">河南东苗养老服务管理系统</div>
    <div class="container">
        <div class="page-title">老人档案管理</div>
        <div class="func-box">
            <button onclick="addNew()">档案新增</button>
            <button onclick="openBatchEdit()">档案编辑</button>
            <button onclick="searchTable()">档案查询</button>
            <button onclick="exportExcel()">档案导出</button>
        </div>
        <p style="text-align: center;color: #666;margin-bottom: 30px;">老人基本信息、健康信息、家属信息等档案一站式管理</p>

        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 输入姓名、电话、住址、年龄搜索..." onkeyup="searchTable()">
        </div>

        <table class="table-box" id="elderTable">
            <tr>
                <th>档案编号</th><th>老人姓名</th><th>性别</th><th>年龄</th><th>家庭住址</th><th>联系电话</th><th>所属社区</th><th>建档时间</th><th>健康状态</th><th>操作</th>
            </tr>
        </table>

        <br>
        <a href="index.html" class="back">返回主页面</a>
    </div>

    <!-- 查看弹窗 -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h3>老人详情</h3>
            <div id="viewInfo"></div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h3>编辑档案</h3>
            <div id="editInfo"></div>
            <div class="modal-btns">
                <button onclick="saveEdit()">保存</button>
                <button onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 新增弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h3>新增老人档案</h3>
            <div class="item">姓名：<input id="addName"></div>
            <div class="item">性别：<input id="addSex"></div>
            <div class="item">年龄：<input id="addAge"></div>
            <div class="item">住址：<input id="addAddr"></div>
            <div class="item">电话：<input id="addPhone"></div>
            <div class="modal-btns">
                <button onclick="saveAdd()">确认新增</button>
                <button onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

// 需要标红的老人
const keyPersons = ["陈桂英","心灵","钱玉梅","张玉花","绍子英","焦秀云","齐桂兰","于随海""丁万春","万铁栏","于喜州","焦秀云","于随海","张玉花","绍子英","钱玉梅","陈桂英","齐桂兰","吴臻荣","吴顺各","周希娥","孟照显","宋长凤","崔天花","张党妞","张宗仁","张毕珍","张肖恩","张花","张荣花","张金明","徐爱平","徐琴","敬秀花","易成斌","曹小银","朱允强","朱秀春","李宪毅","李忠民","李恒悦","李春荣","李秀荣","李美秀","李苗英","杨万友","杨垅","樊爱兰","武见","牛兴桃","王泠林","王根铭","王秀英","王花芝","王银焕","田洪斌","申秀荣","秦保花","罗现奇"];

// 渲染表格
function renderTable(){
    let table = document.getElementById("elderTable");
    let html = `<tr><th>档案编号</th><th>老人姓名</th><th>性别</th><th>年龄</th><th>家庭住址</th><th>联系电话</th><th>所属社区</th><th>建档时间</th><th>健康状态</th><th>操作</th></tr>`;
    data.forEach(item=>{
        let isRed = keyPersons.includes(item.name) ? "red-row" : "";
        html+=`
        <tr class="${isRed}">
            <td>DM-YL-${String(item.id).padStart(3,'0')}</td>
            <td>${item.name}</td>
            <td>${item.sex}</td>
            <td>${item.age || '-'}</td>
            <td>${item.addr}</td>
            <td>${item.phone || '-'}</td>
            <td>${item.community}</td>
            <td>${item.date}</td>
            <td>${item.healthStatus}</td>
            <td class="table-op">
                <a onclick="view(${item.id})">查看</a>|<a onclick="edit(${item.id})">编辑</a>|<a onclick="del(${item.id})">删除</a>
            </td>
        </tr>`;
    });
    table.innerHTML = html;
}
renderTable();

// 搜索
function searchTable() {
    let input = document.getElementById("searchInput").value.toUpperCase();
    let trs = document.querySelectorAll("#elderTable tr");
    for(let i=1;i<trs.length;i++){
        trs[i].style.display = trs[i].innerText.toUpperCase().includes(input)?"":"none";
    }
}

// 查看详情
function view(id){
    let d = data.find(x=>x.id==id);
    let noteHtml = "";
    if(d.note && d.note.trim() !== ""){
        noteHtml = `<div class="item note-text">备注：${d.note}</div>`;
    } else {
        noteHtml = `<div class="item note-text">健康状况：无疾病，身体健康</div>`;
    }

    document.getElementById("viewInfo").innerHTML = `
        <div class="item">姓名：${d.name}</div>
        <div class="item">性别：${d.sex}</div>
        <div class="item">年龄：${d.age || '-'}</div>
        <div class="item">住址：${d.addr}</div>
        <div class="item">电话：${d.phone || '-'}</div>
        <div class="item">社区：${d.community}</div>
        <div class="item">建档：${d.date}</div>
        <div class="item">健康状态：${d.healthStatus}</div>
        ${noteHtml}`;
    document.getElementById("viewModal").style.display = "flex";
}

// 编辑
function edit(id){
    let d = data.find(x=>x.id==id);
    document.getElementById("editInfo").innerHTML = `
        <input type="hidden" id="editId" value="${d.id}">
        <div class="item">姓名：<input id="editName" value="${d.name}"></div>
        <div class="item">性别：<input id="editSex" value="${d.sex}"></div>
        <div class="item">年龄：<input id="editAge" value="${d.age}"></div>
        <div class="item">住址：<input id="editAddr" value="${d.addr}"></div>
        <div class="item">电话：<input id="editPhone" value="${d.phone}"></div>`;
    document.getElementById("editModal").style.display = "flex";
}

// 批量编辑提示
function openBatchEdit(){
    alert("请点击列表中的【编辑】按钮进行修改");
}

// 保存编辑
function saveEdit(){
    let id = document.getElementById("editId").value;
    let d = data.find(x=>x.id==id);
    d.name = document.getElementById("editName").value;
    d.sex = document.getElementById("editSex").value;
    d.age = document.getElementById("editAge").value;
    d.addr = document.getElementById("editAddr").value;
    d.phone = document.getElementById("editPhone").value;
    closeModal();
    renderTable();
    alert("修改成功！");
}

// 删除
function del(id){
    if(!confirm("确定删除该老人档案？")) return;
    data = data.filter(x=>x.id!=id);
    renderTable();
    alert("删除成功！");
}

// 新增
function addNew(){
    document.getElementById("addModal").style.display = "flex";
}

// 保存新增
function saveAdd(){
    let name = document.getElementById("addName").value.trim();
    if(!name){ alert("请输入姓名！"); return; }
    
    let newId = data.length > 0 ? Math.max(...data.map(x=>x.id)) + 1 : 1;
    let now = new Date();
    let dateStr = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,'0')+"-"+String(now.getDate()).padStart(2,'0');
    
    data.push({
        id: newId,
        name: name,
        sex: document.getElementById("addSex").value || "",
        age: document.getElementById("addAge").value || "",
        addr: document.getElementById("addAddr").value || "",
        phone: document.getElementById("addPhone").value || "",
        community: "东苗社区",
        date: dateStr,
        healthStatus: "健康",
        note: ""
    });
    
    closeModal();
    renderTable();
    alert("新增成功！");
    
    document.getElementById("addName").value = "";
    document.getElementById("addSex").value = "";
    document.getElementById("addAge").value = "";
    document.getElementById("addAddr").value = "";
    document.getElementById("addPhone").value = "";
}

// 导出Excel
function exportExcel(){
    let csv = "档案编号,姓名,性别,年龄,家庭住址,联系电话,所属社区,建档时间,健康状态,备注\n";
    data.forEach(item=>{
        csv += `DM-YL-${String(item.id).padStart(3,'0')},${item.name},${item.sex},${item.age || ''},${item.addr},${item.phone || ''},${item.community},${item.date},${item.healthStatus},${item.note || '无疾病，身体健康'}\n`;
    });
    
    let blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {type: "text/csv;charset=utf-8"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "东苗社区老人档案_" + new Date().toLocaleDateString() + ".csv";
    a.click();
    URL.revokeObjectURL(url);
}

// 关闭弹窗
function closeModal(){
    document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}
