<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东苗养老 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            /* 地图做背景 + 虚化遮罩 */
            background: #fdf5e6 url('community.png') center center / cover no-repeat fixed;
            background-blend-mode: overlay;
            background-color: rgba(253, 245, 230, 0.88);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 520px;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(255, 153, 0, 0.15);
            border: 1px solid #e6c8a1;
            padding: 60px 50px;
        }

        .login-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #FF6600;
            margin-bottom: 40px;
        }

        .input-item {
            margin-bottom: 28px;
        }

        .input-item label {
            display: block;
            font-size: 16px;
            color: #8b5a2b;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .input-item input {
            width: 100%;
            height: 50px;
            border: 1px solid #d4b48b;
            border-radius: 6px;
            padding: 0 18px;
            font-size: 16px;
            outline-color: #FF9900;
        }

        .login-btn {
            width: 100%;
            height: 55px;
            background: #FF9900;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }

        .login-btn:hover {
            background: #e68a00;
        }

        .tips {
            text-align: center;
            margin-top: 25px;
            font-size: 15px;
            color: #a07046;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-title">河南东苗养老服务系统</div>
        <div class="input-item">
            <label>管理员账号</label>
            <input type="text" id="username" placeholder="请输入管理员账号">
        </div>
        <div class="input-item">
            <label>登录密码</label>
            <input type="password" id="password" placeholder="请输入登录密码">
        </div>
        <button class="login-btn" onclick="login()">立即登录</button>
        <div class="tips">默认账号：admin  密码：123456</div>
    </div>

    <script>
        function login() {
            let user = document.getElementById("username").value;
            let pwd = document.getElementById("password").value;
            if (user === "admin" && pwd === "123456") {
                window.location.href = "login.html";
            } else {
                alert("账号或密码错误，请重试！");
            }
        }
    </script>
</body>
</html>
