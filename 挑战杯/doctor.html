<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医护人员管理 - 东苗养老</title>
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;font-family: "微软雅黑", sans-serif;}
        body {padding: 20px;background: #f5f5f5;}
        .header {width: 100%;background: #FF9900;color: #000;font-size: 22px;font-weight: bold;text-align: center;padding: 10px 0;border: 1px solid #000;margin-bottom: 20px;}
        .container {width: 100%;max-width: 1400px;margin: 0 auto;background: #fff;border: 1px solid #000;padding: 30px;}
        .page-title {font-size: 20px;font-weight: bold;color: #FF6600;text-align: center;margin-bottom: 30px;padding-bottom: 10px;border-bottom: 2px solid #FFE4B5;}
        /* 表单样式 */
        .form-box {border: 1px solid #ccc;padding: 20px;margin-bottom: 30px;border-radius: 4px;background: #f9f9f9;}
        .form-title {font-size: 16px;font-weight: bold;margin-bottom: 15px;color: #FF6600;}
        .form-row {display: flex;flex-wrap: wrap;gap: 20px;margin-bottom: 15px;align-items: center;}
        .form-item {display: flex;flex-direction: column;width: 280px;}
        .form-item label {font-size: 14px;margin-bottom: 5px;color: #333;}
        .form-item input, .form-item select {padding: 8px;border: 1px solid #ccc;border-radius: 4px;font-size: 14px;}
        .form-btn {padding: 8px 25px;background: #FF9900;color: #fff;border: 1px solid #000;border-radius: 4px;cursor: pointer;font-size: 14px;margin-right: 10px;}
        .form-btn:hover {background: #FF8800;}
        /* 表格样式 */
        .table-box {width: 100%;border-collapse: collapse;border: 1px solid #333;margin-bottom: 30px;}
        .table-box th, .table-box td {border: 1px solid #333;padding: 10px;text-align: center;font-size: 14px;}
        .table-box th {background: #FFE4B5;font-weight: bold;}
        .table-op a {color: #FF6600;text-decoration: none;margin: 0 5px;}
        .table-op a:hover {text-decoration: underline;}
        /* 返回按钮 */
        .back {display: block;width: 120px;height: 36px;line-height: 36px;text-align: center;background: #FFE4B5;border: 1px solid #000;margin: 0 auto;border-radius: 4px;cursor: pointer;color: #000;text-decoration: none;}
        .back:hover {background: #FFD8A8;}
        /* 底部企业标语 */
        .footer {width: 100%;max-width: 1400px;margin: 10px auto 0;font-size: 14px;color: #666;text-align: center;}
    </style>
</head>

    <div class="container">
